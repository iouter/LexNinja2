name: "🔄内容修改建议"
description: “对蕾忍Mod中现有的某项内容（如卡牌、遗物、怪物）的数值或机制提出修改方案。”
title: "[Suggest]: "
labels: ["suggest change"]

body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请详细说明你希望修改的内容、理由和具体方案。

  - type: input
    id: target-content
    attributes:
      label: 目标内容
      description: 指明你想修改的具体Mod内容（卡牌/遗物/怪物/药水等）
    validations:
      required: true

  - type: textarea
    id: current-issue
    attributes:
      label: 当前问题或现状
      description: 描述该项内容目前的设定及其存在的问题（如强度失衡、效果不佳等）
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 建议修改方案
      description: 提出你的具体修改建议和理由
    validations:
      required: true